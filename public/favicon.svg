<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1535"/>
      <stop offset="100%" stop-color="#0d0b1a"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="55%" stop-color="#f4a015"/>
      <stop offset="100%" stop-color="#c87010"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="32" height="32" rx="6"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#7c4dbb" stroke-width="1" opacity="0.5"/>

  <!-- 5-pointed star: center (16,16), outer R=12, inner r=4.8 -->
  <polygon
    points="16,4 18.82,12.12 27.41,12.29 20.57,17.48 23.05,25.71 16,20.8 8.95,25.71 11.43,17.48 4.59,12.29 13.18,12.12"
    fill="url(#star)"
  />

  <!-- Shine overlay on top half of star -->
  <polygon
    points="16,4 18.82,12.12 27.41,12.29 20.57,17.48 23.05,25.71 16,20.8 8.95,25.71 11.43,17.48 4.59,12.29 13.18,12.12"
    fill="url(#shine)"
    clip-path="inset(0 0 45% 0)"
  />

  <!-- Tiny sparkle dot above star tip -->
  <circle cx="16" cy="2.5" r="0.8" fill="#fff9c4" opacity="0.8"/>
</svg>